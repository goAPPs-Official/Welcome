<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goCBT | Student Activation Portal</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --go-blue: #1a2a44;
            --go-green: #2ecc71;
            --text-dark: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border-top: 8px solid var(--go-green);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--go-blue);
            margin: 0;
            font-size: 24px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--go-blue);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--go-green);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--go-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0d1a2e;
        }

        #response-msg {
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="header">
        <h1>goCBT Activation</h1>
        <p>Enter your details to receive your 5-digit OTP</p>
    </div>

    <form id="registration-form">
        <div class="input-group">
            <label for="student_name">Full Name</label>
            <input type="text" id="student_name" name="student_name" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label for="student_email">Email Address</label>
            <input type="email" id="student_email" name="student_email" placeholder="you@example.com" required>
        </div>

        <div class="input-group">
            <label for="school_name">School Name</label>
            <input type="text" id="school_name" name="school_name" placeholder="Your School" required>
        </div>

        <div class="input-group">
            <label for="study_pin">Study PIN (from eCard)</label>
            <input type="text" id="study_pin" name="study_pin" placeholder="XXXXX-XX" required>
        </div>

        <button type="submit" id="submit-btn">Send My 5-Digit OTP</button>
    </form>

    <div id="response-msg"></div>
</div>

<script type="text/javascript">
    (function() {
        // REPLACE "YOUR_PUBLIC_KEY" with your actual EmailJS Public Key
        emailjs.init("YOUR_PUBLIC_KEY");
    })();

    document.getElementById('registration-form').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('response-msg');
        btn.innerText = 'Processing...';

        // These IDs must match your EmailJS Service and Template IDs
        const serviceID = 'YOUR_SERVICE_ID';
        const templateID = 'YOUR_TEMPLATE_ID';

        emailjs.sendForm(serviceID, templateID, this)
            .then(() => {
                btn.style.display = 'none';
                msg.style.display = 'block';
                msg.style.color = '#2ecc71';
                msg.innerText = "Success! Check your email for your 5-digit OTP.";
            }, (err) => {
                btn.innerText = 'Send My 5-Digit OTP';
                alert(JSON.stringify(err));
            });
    });
</script>

</body>
</html>
